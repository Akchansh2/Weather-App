<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌦 Weather App</h1>
    
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button id="searchBtn">Search</button>

    <div class="weather-box">
        <h2 id="cityName"></h2>
        <p id="temperature"></p>
        <p id="description"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
